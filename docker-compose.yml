services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DB_HOST: ${DB_HOST:-172.17.0.1}
      DB_PORT: "3306"
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-utbk_belajar}
      APP_PORT: "3000"
      APP_PASSWORD: ${APP_PASSWORD:-}
      NODE_ENV: production
